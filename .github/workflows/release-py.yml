# =============================================================================
# Python (PyPI) release workflow for `turbo-xlsx-rs`.
#
# A SEPARATE, opt-in workflow that does NOT touch the npm `release.yml`. Builds
# maturin abi3 wheels (CPython 3.8+, one per platform) plus an sdist, for TWO
# distributions, and publishes to PyPI on a `pyv*` tag (first: pyv0.1.1):
#   * turbo-xlsx-rs        — lean writer-only build.
#   * turbo-xlsx-rs-parse  — built with --features parse (writer + XLSX reader).
# (PyPI rejects `turbo-xlsx`: it collapses to the existing `turboxlsx`.)
# Both expose the SAME import name `turbo_xlsx`; you install whichever variant
# you need (the with/without split mirrors turbo-html2pdf's fonts). Gated on the
# `PYPI_TOKEN` secret: until it is set the publish job is a no-op, so merging
# this file cannot trigger an accidental release.
#
# Wheels build from crates/turbo-xlsx-py/ (manifest + pyproject there).
# =============================================================================

name: Release (PyPI)

on:
  push:
    tags: ['pyv*'] # Python-only release tag. First: pyv0.1.0. Never `v*`.
  workflow_dispatch: # Allow a manual dry-run build with no publish.

permissions:
  contents: read

jobs:
  build:
    name: build wheel ${{ matrix.variant }} ${{ matrix.platform.target }}
    runs-on: ${{ matrix.platform.os }}
    strategy:
      fail-fast: false
      # Two independent axes that cross-multiply: variant × platform = 8 wheels.
      # (An `include`-only platform list does NOT cross with `variant` — it adds
      # standalone jobs — which is why the platform must be its own list axis.)
      matrix:
        variant: [base, parse]
        platform:
          - { os: ubuntu-latest, target: x86_64, manylinux: auto }
          - { os: ubuntu-latest, target: aarch64, manylinux: auto }
          - { os: macos-latest, target: aarch64, manylinux: auto }
          - { os: windows-latest, target: x64, manylinux: auto }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      # The parse distribution is the same crate + the `parse` feature, published
      # under a distinct PyPI name. Rewrite only the [project] name line.
      - name: Rename distribution for the parse variant
        if: matrix.variant == 'parse'
        shell: bash
        run: sed -i.bak 's/^name = "turbo-xlsx-rs"$/name = "turbo-xlsx-rs-parse"/' crates/turbo-xlsx-py/pyproject.toml
      # abi3 → ONE wheel per platform serves every CPython >= 3.8.
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          manylinux: ${{ matrix.platform.manylinux }}
          args: --release --out dist --manifest-path crates/turbo-xlsx-py/Cargo.toml ${{ matrix.variant == 'parse' && '--features parse' || '' }}
          working-directory: .
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.variant }}-${{ matrix.platform.os }}-${{ matrix.platform.target }}
          path: dist/*.whl
          if-no-files-found: error

  sdist:
    name: build sdist ${{ matrix.variant }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        variant: [base, parse]
    steps:
      - uses: actions/checkout@v4
      - name: Rename distribution for the parse variant
        if: matrix.variant == 'parse'
        run: sed -i.bak 's/^name = "turbo-xlsx-rs"$/name = "turbo-xlsx-rs-parse"/' crates/turbo-xlsx-py/pyproject.toml
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist --manifest-path crates/turbo-xlsx-py/Cargo.toml
      - uses: actions/upload-artifact@v4
        with:
          name: sdist-${{ matrix.variant }}
          path: dist/*.tar.gz
          if-no-files-found: error

  publish:
    name: publish to PyPI
    needs: [build, sdist]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/pyv')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Guard on PYPI_TOKEN
        id: guard
        env:
          PYPI_TOKEN: ${{ secrets.PYPI_TOKEN }}
        run: |
          if [ -z "$PYPI_TOKEN" ]; then
            echo "PYPI_TOKEN not set — skipping publish (draft)."
            echo "publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "publish=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Publish
        if: steps.guard.outputs.publish == 'true'
        uses: PyO3/maturin-action@v1
        env:
          MATURIN_PYPI_TOKEN: ${{ secrets.PYPI_TOKEN }}
        with:
          command: upload
          args: --non-interactive --skip-existing dist/*
