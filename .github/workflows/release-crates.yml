# =============================================================================
# crates.io release workflow for `turbo-xlsx-core`.
#
# Publishes the Rust core crate to crates.io on a `v*` tag (same tag as the npm
# release; first: v0.1.0). Only the CORE crate is published — the napi/py/wasm
# bindings are cdylibs shipped to npm/PyPI, not useful as crates, and the MCP
# server is a binary. Consumers opt into the reader with `features = ["parse"]`.
#
# Gated on the `CARGO_REGISTRY_TOKEN` secret (what `cargo publish` reads
# natively): until it is set the publish step is a no-op, so the tag cannot
# trigger an accidental crates.io release. `cargo publish` is idempotent-safe
# here — re-running a tag for an already-published version errors loudly rather
# than double-publishing.
# =============================================================================

name: Release (crates.io)

on:
  push:
    tags: ['v*'] # shares the npm release tag. First: v0.1.0.

permissions:
  contents: read

jobs:
  publish:
    name: publish turbo-xlsx-core to crates.io
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # Verify the crate packages cleanly (resolves workspace inheritance, runs
      # the verify build) before we touch the token — a bad package fails here.
      - name: Package (dry-run verify)
        run: cargo package -p turbo-xlsx-core
      - name: Guard on CARGO_REGISTRY_TOKEN
        id: guard
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          if [ -z "$CARGO_REGISTRY_TOKEN" ]; then
            echo "CARGO_REGISTRY_TOKEN not set — skipping publish (draft)."
            echo "publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "publish=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Publish turbo-xlsx-core
        if: steps.guard.outputs.publish == 'true'
        run: cargo publish -p turbo-xlsx-core
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
